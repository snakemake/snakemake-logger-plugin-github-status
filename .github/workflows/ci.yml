name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  format:
    if: "!startsWith(github.head_ref, 'release-please')"
    runs-on: ubuntu-latest
    steps:
      - name: Check out the code
        uses: actions/checkout@v6

      - name: Setup pixi
        uses: prefix-dev/setup-pixi@v0

      - name: Check formatting
        run: pixi run format --check

  lint:
    if: "!startsWith(github.head_ref, 'release-please')"
    runs-on: ubuntu-latest
    steps:
      - name: Check out the code
        uses: actions/checkout@v6

      - name: Setup pixi
        uses: prefix-dev/setup-pixi@v0

      - name: Check code
        run: pixi run lint

  typecheck:
    if: "!startsWith(github.head_ref, 'release-please')"
    runs-on: ubuntu-latest
    steps:
      - name: Check out the code
        uses: actions/checkout@v6

      - name: Setup pixi
        uses: prefix-dev/setup-pixi@v0

      - name: Check code
        run: pixi run typecheck

  test:
    if: "!startsWith(github.head_ref, 'release-please')"
    runs-on: ubuntu-latest
    permissions:
      statuses: write
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Setup pixi
        uses: prefix-dev/setup-pixi@v0

      - name: Run pytest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pixi run test -v

      - name: Run Coverage
        run: pixi run coverage-report
